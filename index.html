<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safa | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
    <style>
        body {
            background-color: #0b0e14;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            line-height: 1.6;
        }
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&q=80&w=1000');
            background-size: cover;
        }
        h1 { font-size: 4rem; color: #00d4ff; margin-bottom: 0; }
        .subtitle { font-size: 1.5rem; opacity: 0.8; }
        .section { padding: 100px 20px; max-width: 800px; margin: auto; }
        .skill-card {
            background: #1a1f29;
            padding: 20px;
            border-radius: 10px;
            border-left: 5px solid #00d4ff;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <section class="hero">
        <h1 data-aos="zoom-in">SAFA</h1>
        <p class="subtitle" data-aos="fade-up" data-aos-delay="300">Systemintegration | IT-Enthusiast | Hamburg</p>
    </section>

    <section class="section" data-aos="fade-right">
        <h2>Über mich</h2>
        <p>Abitur 2025. IHK-geprüft. Bereit für die IT-Welt. Ich kombiniere Verantwortungsbewusstsein mit technischer Neugier.</p>
    </section>

    <section class="section">
        <h2>Skills</h2>
        <div class="skill-card" data-aos="flip-up">Hardware-Analyse & Reparatur</div>
        <div class="skill-card" data-aos="flip-up" data-aos-delay="200">Netzwerkgrundlagen</div>
        <div class="skill-card" data-aos="flip-up" data-aos-delay="400">Windows & Linux Basics</div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <script>
        AOS.init({ duration: 1000 });
    </script>
</body>
</html>
